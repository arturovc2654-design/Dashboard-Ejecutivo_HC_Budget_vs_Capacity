<script>
  async function cargarDatos() {
    try {
      const response = await fetch("dashboard_data.json");
      const data = await response.json();

      // Ejemplo: actualizar KPIs con datos agregados
      const hcBudget = data.reduce((acc, d) => acc + (d.Jul_B || 0), 0);
      const hcCapacity = data.reduce((acc, d) => acc + (d.Jul_C || 0), 0);
      const gapHC = hcCapacity - hcBudget;
      const cumplimiento = hcBudget > 0 ? (hcCapacity / hcBudget) * 100 : 0;

      document.getElementById("hcBudget").innerText = hcBudget.toFixed(0);
      document.getElementById("hcCapacity").innerText = hcCapacity.toFixed(0);
      document.getElementById("gapHC").innerText = gapHC.toFixed(0);
      document.getElementById("cumplimiento").innerText = cumplimiento.toFixed(1) + "%";

      // Forecast ejemplo (promedio de meses)
      const forecast = ["Jul_C","Ago_C","Set_C","Oct_C","Nov_C","Dic_C"]
        .map(m => data.reduce((acc,d)=>acc+(d[m]||0),0))
        .reduce((a,b)=>a+b,0) / 6;
      document.getElementById("forecast").innerText = forecast.toFixed(0);

      // Ranking de negocios
      const rankingTable = document.getElementById("rankingTable");
      data.slice(0,10).forEach(d => {
        const row = `<tr>
          <td>${d.Negocio || "-"}</td>
          <td>${d.Jul_B || 0}</td>
          <td>${d.Jul_C || 0}</td>
          <td>${(d.Jul_C||0)-(d.Jul_B||0)}</td>
          <td>${d.Jul_B ? ((d.Jul_C||0)/(d.Jul_B||1)*100).toFixed(1)+"%" : "-"}</td>
        </tr>`;
        rankingTable.innerHTML += row;
      });

      // Gráfico Top Crecimiento
      const ctx = document.getElementById("topCrecimiento").getContext("2d");
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: data.slice(0,5).map(d => d.Negocio),
          datasets: [{
            label: 'Gap HC',
            data: data.slice(0,5).map(d => (d.Jul_C||0)-(d.Jul_B||0)),
            backgroundColor: '#0078D4'
          }]
        }
      });

    } catch (error) {
      console.error("Error cargando datos:", error);
    }
  }

  cargarDatos();
</script>
